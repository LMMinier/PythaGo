  <text x="1024" y="1840" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="92" fill="#ffd05a" stroke="#061321" stroke-width="8" paint-order="stroke">LEARN PYTHON. RESTORE THE CITY.</text>
</svg>
